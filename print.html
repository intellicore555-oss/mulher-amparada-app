<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mulher Amparada • Galeria</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;

    font-family:'Quicksand',sans-serif;

    overflow-x:hidden;
}

/* Header */

header{
    width:100%;

    padding:80px 20px 50px;

    text-align:center;
}

header h1{
    color:white;

    font-size:clamp(2.5rem,8vw,5rem);

    font-weight:700;

    letter-spacing:2px;

    margin-bottom:12px;
}

header p{
    color:rgba(255,255,255,.45);

    font-size:1rem;
}

/* Galeria */

.gallery{
    width:100%;

    max-width:1500px;

    margin:auto;

    padding:20px 25px 100px;

    display:grid;

    grid-template-columns:
        repeat(auto-fit,minmax(280px,1fr));

    gap:28px;
}

/* Cards */

.card{
    position:relative;

    overflow:hidden;

    border-radius:28px;

    background:#0d0d0d;

    border:1px solid rgba(255,255,255,.08);

    transition:
        transform .4s ease,
        box-shadow .4s ease;
}

.card:hover{
    transform:
        translateY(-10px)
        scale(1.02);

    box-shadow:
        0 25px 60px rgba(255,255,255,.08);
}

.card img{
    width:100%;
    height:100%;

    min-height:550px;

    object-fit:cover;

    display:block;

    transition:
        transform .5s ease,
        filter .5s ease;
}

.card:hover img{
    transform:scale(1.05);

    filter:brightness(1.08);
}

</style>
</head>
<body>

<header>
    <h1>Mulher Amparada</h1>
    <p>Galeria Oficial • Prints/screenshots do app</p>
</header>

<section class="gallery">

    <div class="card">
        <img src="print1.png" alt="Print 1">
    </div>

    <div class="card">
        <img src="print2.png" alt="Print 2">
    </div>

    <div class="card">
        <img src="print3.png" alt="Print 3">
    </div>

    <div class="card">
        <img src="print4.png" alt="Print 4">
    </div>

    <div class="card">
        <img src="print5.png" alt="Print 5">
    </div>

    <div class="card">
        <img src="print6.png" alt="Print 6">
    </div>

</section>

</body>
</html>
